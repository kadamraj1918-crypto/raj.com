<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MeetChat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f1117;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#joinScreen,
#chatScreen{
width:100%;
max-width:900px;
}

.card{
background:#171a23;
padding:25px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#232838;
color:white;
}

button{
padding:12px 16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#4f7cff;
color:white;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#171a23;
border-radius:12px 12px 0 0;
}

.chatContainer{
height:70vh;
display:flex;
flex-direction:column;
background:#171a23;
border-radius:12px;
overflow:hidden;
}

.messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
margin-bottom:12px;
}

.message strong{
color:#7ea2ff;
}

.time{
font-size:11px;
opacity:.6;
margin-left:8px;
}

.inputBar{
display:flex;
padding:10px;
background:#1f2432;
gap:10px;
}

.inputBar input{
margin:0;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<div id="joinScreen">
<div class="card">
<h1>MeetChat</h1>

<input id="username" placeholder="Username">

<input id="roomCode" placeholder="Room Code">

<button onclick="joinRoom()">
Join Room
</button>
</div>
</div>

<div id="chatScreen" class="hidden">

<div class="chatContainer">

<div class="topbar">
<div>
Room:
<b id="roomLabel"></b>
</div>

<div id="onlineCount">
Online: -
</div>
</div>

<div class="messages" id="messages"></div>

<div class="inputBar">
<input id="messageInput" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* PUT YOUR FIREBASE CONFIG HERE */

const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_PROJECT.firebaseapp.com",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_PROJECT.appspot.com",
messagingSenderId: "123456789",
appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentRoom="";
let currentUser="";

window.joinRoom = function(){

currentUser =
document.getElementById("username").value.trim();

currentRoom =
document.getElementById("roomCode").value.trim();

if(!currentUser || !currentRoom){
alert("Enter username and room code");
return;
}

document.getElementById("joinScreen")
.classList.add("hidden");

document.getElementById("chatScreen")
.classList.remove("hidden");

document.getElementById("roomLabel")
.textContent=currentRoom;

listenMessages();

};

window.sendMessage = async function(){

const input=
document.getElementById("messageInput");

const text=input.value.trim();

if(!text) return;

await addDoc(
collection(
db,
"rooms",
currentRoom,
"messages"
),
{
author:currentUser,
text:text,
created:Date.now()
}
);

input.value="";
};

function listenMessages(){

const q=query(
collection(
db,
"rooms",
currentRoom,
"messages"
),
orderBy("created")
);

onSnapshot(q,(snapshot)=>{

const box=
document.getElementById("messages");

box.innerHTML="";

snapshot.forEach((doc)=>{

const data=doc.data();

const div=
document.createElement("div");

div.className="message";

div.innerHTML=
`
<strong>${escapeHtml(data.author)}</strong>
<span class="time">
${new Date(data.created)
.toLocaleTimeString()}
</span>
<br>
${escapeHtml(data.text)}
`;

box.appendChild(div);

});

box.scrollTop=
box.scrollHeight;

});

}

function escapeHtml(text){

const div=
document.createElement("div");

div.innerText=text;

return div.innerHTML;
}

</script>

</body>
</html>
